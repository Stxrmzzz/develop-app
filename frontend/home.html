<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
    body {
        font-family: 'Montserrat', sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 300;
        letter-spacing: 2px;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 30px;
    }

    button {
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        color: white;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #22c55e;
        color: black;
        transform: translateY(-2px);
    }

    .logout {
        background: rgba(255,0,0,0.2);
        border: 1px solid red;
    }

    .logout:hover {
        background: red;
        color: white;
    }

    .productos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
    }

    .producto {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(12px);
        transition: 0.3s;
        position: relative;
        overflow: hidden;
    }

    .producto::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: linear-gradient(120deg, transparent, rgba(34,197,94,0.3), transparent);
        opacity: 0;
        transition: 0.3s;
    }

    .producto:hover::before {
        opacity: 1;
    }

    .producto:hover {
        transform: scale(1.03);
    }

    .producto h3 {
        margin-bottom: 10px;
        font-weight: 500;
    }

    .producto p {
        font-size: 14px;
        color: #94a3b8;
    }

    .precio {
        margin-top: 10px;
        font-size: 18px;
        font-weight: bold;
        color: #22c55e;
    }
</style>
</head>
<body>

<h2>Tienda</h2>

<div class="top-bar">
    <div>
        <button onclick="verCarrito()">Ver carrito</button>
        <button onclick="crearPedido()">Crear pedido</button>
    </div>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<div id="productos" class="productos"></div>




<script>

const token = localStorage.getItem('token');

if (!token) {
    window.location.href = 'index.html';
}

async function cargarProductos() {
    const response = await fetch('http://127.0.0.1:8002/productos');
    const data = await response.json();

    const contenedor = document.getElementById('productos');
    contenedor.innerHTML = "";

    data.forEach(p => {
        contenedor.innerHTML += `
            <div class="producto">
                <h3>${p.nombre}</h3>
                <p>${p.descripcion}</p>
                <p class="precio">$ ${p.precio}</p>
                <button onclick="agregar(${p.id})">Agregar al carrito</button>
            </div>
        `;
    });
}

async function agregar(id) {
    await fetch('http://127.0.0.1:8003/carrito', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            producto_id: id,
            cantidad: 1
        })
    });

    alert("Producto agregado al carrito");
}

async function crearPedido() {
    const response = await fetch('http://127.0.0.1:8004/pedidos', {
        method: 'POST'
    });

    const data = await response.json();

    if (response.ok) {
        alert("Pedido creado. Total: " + data.total);
    } else {
        alert(data.detail);
    }
}

async function verCarrito() {
    const response = await fetch('http://127.0.0.1:8003/carrito');
    const carrito = await response.json();

    if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
    }

    let mensaje = "Carrito:\n\n";

    for (let item of carrito) {
        const resProd = await fetch(`http://127.0.0.1:8002/productos/${item.producto_id}`);
        const producto = await resProd.json();

        mensaje += `${producto.nombre} - Cantidad: ${item.cantidad}\n`;
    }

    alert(mensaje);
}

function logout() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
}

window.onload = cargarProductos;
</script>

</body>
</html>
